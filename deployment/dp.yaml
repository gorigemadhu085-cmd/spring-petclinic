apiVersion: apps/v1
kind: Deployment
metedata: 
  name: my-dp
spec: 
  minReadySeconds: 5
  replicas: 4
  selector: 
    matchLabels: 
      app: myapp
  strategy:
    type: RollingUpdate
    rollingUpdate: 
      maxSurge: 25%
      maxUnavailable: 25%
  template: 
    metadata: 
      name: my-pod-red
      labels: 
        app: myapp
    spec: 
      containers: 
        - name: my-container-red
          image: 928102491225.dkr.ecr.ap-southeast-1.amazonaws.com/dev/spcimage:latest
          ports:
            - containerPort: 80              