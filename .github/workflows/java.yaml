name: SonarQube Analysis

on:
  push:
    branches:
      - main
jobs:
  build:
    name: my-spc
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Java with Maven
        run : mvn package

      - name: SonarQube scan
        env:
          SONAR_TAKEN: $({secrets.SONAR_TOKEN})
          SONAR_HOST_URL: $({secrets.SONAR_HOST_URL})
        run:
          mvn -B verify org.sonar-source.scanner.maven:sonar-plugin:5.5.0.6356:sonar -Dsonar.projectKey=gorigemadhu085-cmd_spring-petclinic